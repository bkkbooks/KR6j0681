body:
  text: 四行陰魔相分三一具示始終二一始初未破區宇二一躡前想陰盡相阿難二狀示行陰區宇生滅二終破顯露妄源若此二中間十計十一二種無因三一標由示墜阿難二分條詳釋二一本無因三一據己見量一者二謬成邪計便作三失真墮外由此二末無因三一據己見量二者二謬成邪計今盡三失真墮外由此三結成外論是則二四種徧常三一標由示墜阿難二分條詳釋四一心境計常一者二四大計常二者三八識計常三者四想盡計常四者三結成外論由此三四種顛倒三一標由示墜又三二分條詳釋四一雙約自他一者二約它國土二者三約自身心三者四雙非他自四者三結成外論由此四四種有邊三一標由示墜又三二分條詳釋四一約三際一者二約見聞二者三約彼我三者四約生滅四者三結成外論由此五四種矯亂三一標由示墜又三二分條詳釋四一八亦矯亂一者二唯無矯亂二者三唯是矯亂三者四有無矯亂四者三結成外論由此六十六有相三一標由示墜又三二詳釋其相二一正成本計二一分條例顯或至二總勒名數皆計二更成轉計從此三結成外論由此七八種無相三一標由示墜又三二詳釋其相二一正成本計二一分條例顯見其二總勒名數此質二更成轉計又計三結成外論由此八八種俱非三一標由示墜又三二詳釋其相二一正成本計二一分條例顯色受二總勒名數如是二更成轉計又計三結成外論由此九七際斷滅三一標由示墜又三二具顯其相二一分條詳釋或計二總勒名數如是三結成外論由此十五現涅槃三一標由示墜又三二具顯其相二一分條詳釋或以二總勒名數迷有三結成外論由此三結害囑護三一示因交互阿難二迷則成害眾生三囑令保護二一囑作摧邪知識汝等二囑作趣真導師教其四行陰魔相竟五識陰魔相分三一具示始終二一始初未破區宇二一躡前行陰盡相阿難二狀示識陰區宇於涅二終破顯露妄源若於二中間十執十一因所因執三一兩楹之間阿難二邪解執背能令三結名異種是名二能非能執三一兩楹之間阿難二邪解執背若於三結名異種是名三常非常執三一兩楹之間又善二邪解執背若於三結名異種是名四知無知執三一兩楹之間又善二邪解執背若於三結名異種是名五生無生執三一兩楹之間又善二邪解執背若於三結名異種是名六歸無歸執三一兩楹之間又善二邪解執背若於三結名異種是名七貪非貪執三一兩楹之間又善二邪解執背若於三結名異種是名八真無真執三一兩楹之間又善二邪解執背觀命三結名異種是名九定性雙聞三一兩楹之間又善二邪解執背於命三結名異種是名十定性辟支三一兩楹之間又善二邪解執背於命三結名異種是名三結害囑護三一示因交互阿難二迷則成害二一總標迷妄眾生二分害重輕外道三囑令保護汝等二詳分五魔境相竟三結示超證護持分二一先示超證三一諸佛先證如是二識盡所超三一識盡根融識陰二頓齊等覺二一法說從互二喻說如淨三示超諸位如是三圓證極果入於二後示護持三一首明遵古辨折此是二正令諳識護持二一先令自己諳識三一諳識邪魔魔境二諸魔不現陰魔三二果無障直至二轉令呪護眾生三一正教勸持若諸二兼通寫帶若未三總結魔伏一切三叮囑欽古教範汝當一無問自說五陰魔境竟二因請重明五陰起滅分二一躡前請問三一領前請後阿難二具陳三問三一問生起妄想如佛二問滅除頓漸又此三問陰界淺深如是三願利現未惟願二酬請具答二一具答三問二一答生起妄想三一標說妄想之由三一推原生起元虗三一明真本無陰佛告二表陰皆妄生皆因三喻妄生非實斯元二判決倒計非是二一直示二計俱妄妄元二縱奪況顯必妄阿難三結歸故說妄想是故二詳示五重妄想五一色陰妄想三一示體因想汝体二引喻詳釋二一雙引二想如我二辨顯虗妄懸崖三結妄想名是汝二受陰妄想二一轉想成受即此二推廣結名由因三想陰妄想二一身念相應由汝二推廣結名寤即四行陰妄想三一體遷不覺化理二雙詰是非阿難三推廣結名則汝五識陰妄想四一縱奪真妄二一約性縱真又汝二驗憶奪妄何因二正申喻示阿難三的指滅時非汝四推廣結名故汝三總結妄想所成阿難二答陰界淺深汝今三答滅除頓漸三一生滅次第此五二頓漸始終理則三責妄前教我已二結勸傳正汝應二正宗分已竟三流通分分二一極顯經功二一開二利而況顯福報二一舉利他況顯二一舉多功較定二一如來舉功令較阿難二阿難較定無量阿難二況經功超越三一示誠言起信佛告二明滅罪往生三一極言惡因惡果若復二略舉暫爾弘經能以三因之離苦得樂是人三明獲福勝前得福二舉自利況顯阿難二合二利而深許極果依我二結眾法喜佛三流通分竟大佛頂首楞嚴經正脉科判翻刻緣起是疏成於萬曆丙申冬科成於次年丁酉夏妙峯登禪師見之驚歎禮拜得未曾有勸梓于代藩王自為序彼土學者寥寥流通未廣宋化卿居士為辯父功淹留都下搜訪異書因得斯帙遂能勘破世緣樂其本有還呈雲棲大師我大師印其宗教雙朗性相普融由一返聞入佛知見自經來震旦千五百年疏家未有也正謀翻梓阻以病緣後諸檀越各具上根契心非勉於所校本施貲就刊次第告成惟闕科判葢由條貫未通艱於得味也然此實經之大綱鑑師遙領天台賢首清涼之妙提近證曹勳戚家心光之顯現試覽懸示理脉井然大師自檢衣鉢助刊宋居士以愜素心亦樂為助會廣豐歸自白門持黃屯部貞父蔡庫部伯達羅儀部玄甫所捐俸至即日命梓大師方以靜攝屏筆研命廣豐具緣起舊刻懸示前有代藩製序一首每卷有蒲州萬固沙門妙峯福登校十一字今存之則贅去之則因不明聖經前不可贅勝事後不可昧前因故須緣起云萬曆癸丑孟夏無一道人廣豐述合梓于秀州漏澤寺居士卜宗文總閱莫如德朱懋績二居士分校郡人賀明世莊書吉安李國華經紀其始終凡隨喜讚歎皆有功德奉持領受即證菩提
