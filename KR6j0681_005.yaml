body:
  text: 二證釋別有結元疑分二一阿難別求結元三一就喻索元阿難二引人合喻二一先與合定世尊二詳開合文三一遠敘妄纏從無二願佛愍示惟願三兼被未來亦令三哀求指示作是二如來證無他物三一諸佛同證四一愍衆摩頂三一愍念現在爾時二愍念未來亦為三摩當機頂以聞二動十方界即時三感諸佛瑞三一各放頂光微塵二來灌佛頂其光三大衆喜慶是諸四聞諸佛言二一標普聞同音於是二述諸佛教言二一告結無他物善哉二告解無他物汝復二如來解釋二一阿難未悟而述問阿難二如來詳釋以除疑二一長行三一直以標檢二一標處一體佛告二揀識虗妄識性二重以釋成二一重釋根塵同源阿難二重釋縛脫無二是故三總以結歸云何二偈頌二一標頌爾時二偈文二一祇夜頌前二一頌直以標驗二一超頌揀識虗妄二一揀有為真性二揀無為無為二追頌標處一體二一頌根塵同源二一先以況顯言妄二後以結定中間二頌縛脫無二結解二頌重以釋成二一頌重釋根塵同源汝觀二頌重釋縛脫無二迷晦二伽陀開後二一正以開後解結二別彰五勝五一體性精密陀那二宗趨簡要自心三名稱尊勝是名四力用超越如幻五教相究竟此阿三大衆開悟於是二驗證以釋二疑竟三綰巾以示倫次分三一阿難敘請三一敘已領阿難二敘未明心猶三請垂示惟垂二如來巧示二一巧立喻本二一元依一巾即時二綰成六結二一歷問以顯次第於大二故問以示結同佛告二分答二問二一答六解一忘二一示從至同而遂成至異二一就喻辨定四一按定同異佛告二強異為同於意三阿難不許不也四如來印定佛言二以法合喻則汝二示除至異而仍成至同二一就喻辨定佛告二以法合喻佛言二答舒結倫次二一結之倫次三一順次成結由汝二更以喻明如勞三逆以合喻一切二舒之倫次二一阿難求解倫次阿難二如來因問發明二一先授舒之方法四一就喻巧示三一引悟二邊不解如來二引悟中道方解佛告三印定必用中道佛告二明法精微阿難三示説不謬二一統知染淨因緣如來二懸知極遠極細如是四勸修必證是故二後示舒之倫次三一如來反問引悟阿難二阿難悟喻次第不也三如來乘悟合明三一總與合定佛言二別開合文三一先除我執此根二次除法執空性三後除空執解脫三出名顯證是名三大衆悟明阿難三綰巾以示倫次竟四冥授以選本根分三一阿難請示本根三一領前拜謝一時二正請開示四一自述迷悟以請雖復二慶幸遭遇如來世尊三反言不可無進若復四正求垂示祕嚴惟垂三請後拜懇作是二佛敕諸聖各説三一佛問諸聖二一標所告之衆爾時二述告敕之言二一先按所成之果汝等二後問入圓方便吾今二衆説本因二一衆聖略説四一六塵圓通六一陳那聲塵三一作禮陳白憍陳二陳白之言三一敘悟聲教我在二蒙印命名佛問三音圓得證妙音三結答圓通佛問二優波色塵三一作禮陳白優波二陳白之言三一敘悟色性我亦二蒙印命名如來三色圓得果塵色三結答圓通佛問三香嚴香塵三一作禮陳白香嚴二陳白之言三一敘悟香塵三一因觀有為我聞二諍處聞香我時三即香發明我觀二蒙印命名如來三香圓得果塵氣三結答圓通佛問四藥王味塵三一作禮陳白藥王二陳白之言三一敘悟味塵三一宿因嘗藥我無二備達藥性如是三即味開悟承事二蒙印命名𫎇佛三覺味得果因味三結答圓通佛問五跋陀觸塵三一作禮陳白跋陀二陳白之言三一敘悟觸塵三一宿因入室我等二即觸發悟忽悟三習留今證宿習二蒙印命名彼佛三觸明得果妙觸三結答圓通佛問六迦葉法塵三一作禮陳白摩訶二陳白之言三一敘悟法塵三一宿因感報我於二兼同眷屬此紫三觀法得果我觀二蒙佛印可世尊三法明滅漏妙法三結答圓通佛問二五根圓通五一那律眼根三一作禮陳白阿那二陳白之言四一因訶失目我初二承示三昧世尊三遂得心眼我不四蒙佛印證如來三結答圓通佛問二周利鼻根三一作禮陳白周利二陳白之言四一因闕誦持我闕二奉教調息佛愍三開悟得果其心四蒙佛印證住佛三結答圓通佛問三憍梵舌根三一作禮陳白憍梵二陳白之言四一口業招報我有二奉教止觀如來三超離得果應念四蒙佛印證如來四畢凌身根三一作禮陳白畢陵二陳白之言五一聞談苦諦我初二注思傷足乞食三研窮身覺二一敘述二覺我念二研窮無二我又四入空得果攝念五蒙佛印證得親三結答圓通佛問五空生意根三一作禮陳白須菩二陳白之言三一宿命知空二一遠通宿命不忘我曠二依正自他皆空初在二承教證入二一悟證自果蒙如二同佛知見頓入三蒙佛印證印成三結答圓通佛問三六識圓通四七大圓通二觀音廣陳三佛現瑞應三佛敕文殊揀選二五根圓通竟三六識圓通分六一鶖子眼識三一作禮陳白舍利二陳白之言三一眼識夙利我曠二逢教增悟我於三從佛高證從佛三結答圓通佛問二普賢耳識三一作禮陳白普賢二陳白之言三一輔化垂範我已二耳識鑒機世尊三普護行人若於三結答圓通佛問三孫陀鼻識三一作禮陳白孫陀二陳白之言四一出家心散我初二奉教觀鼻世尊三從鼻悟證二一初見息煙而悟徹我初二次化息光而證果心開四蒙佛授記世尊三結答圓通佛問四滿慈舌識三一作禮陳白富樓二陳白之言三一宿辨説法二一久弘權實我曠二廣衍微妙如是二承教得果二一承教音輪世尊二輔化得果我於三蒙佛印許世尊三結答圓通佛問五波離身識三一作禮陳白優波二陳白之言三一親見成佛我親二秉戒得果承佛三蒙佛印證我是三結答圓通佛問六目連意識三一作禮陳白大目二陳白之言三一遇教發心我初二蒙度證通如來三諸佛印許寧惟三結答圓通佛問三六識圓通竟四七大圓通分七一烏芻火大三一作禮陳白烏芻二陳白之言三一因欲得觀二一宿生多欲我常二遇佛授觀有佛二觀成得名神光三證果發心我以三結答圓通佛問二持地地大三一作禮陳白持地二陳白之言三一積平地行二一正敘平地之行三一從古佛世我念二出家平地我為三經多佛世如是二兼敘效力之行三一豐時全捨或有二飢年節取毗舍三神力苦或有二蒙平心教二一因平地待佛時國二領平心之教毗舍三權實雙證二一悟取權乘三一悟內外地同我即二於諸觸自在微塵三悟無生證果我於二回證知見回心三結答圓通佛問三月光水大三一作禮陳白月光二陳白之言三一古佛授觀我憶二依觀久修二一習觀初後二一初觀身中觀於二後合界外見水二觀成淺深二一初成未得妄身二一標身未忘我於二即事以證三一定中現水當為二投物心痛二一正敘痛由童稚二無知起惑我自三除去如初四一童子具陳爾時二教以除去我則三復見依除童子四出定無恙我後二後方忘身合界逢無三今證菩薩今於三結答圓通佛問四琉璃風大三一作禮陳白琉璃二陳白之言三一古佛示觀三一標遠劫佛名我憶二示能觀本智開示三示所觀風力觀此二觀破羣動三一歷觀動同我於二了動虗妄我時三閲世喻狂如是三頓證徹悟三一逢佛速證逢佛二心開事佛爾時三身心無礙身心三結答圓通佛問五空藏空大三一作禮陳白虗空二陳白之言三一標同佛證我與二詳明神力二一空色無礙二一會色歸空爾時二融空即色又於二依正無礙二一攝剎入身諸幢二分身入剎身能三總由觀空此大三結答圓通佛問六彌勒識大三一作禮陳白彌勒二陳白之言三一上古得定四一上古佛世我憶二出家求名我從三教修唯識爾時四久習忘名歷劫二中古定成三一確指佛世至然二唯識極成我乃三一切唯識二一世界唯識乃至二諸佛唯識世尊三得補處記今得三結答圓通佛問七勢至根大三一作禮陳白大勢二陳白之言四一古佛親授念佛我憶二詳喻感應道交二一先以二人為喻二一單憶無益譬如二雙憶不離二人二後以母子合喻二一合單憶無益十方二合雙憶不離子若三合喻顯示深益二一必定見佛益若衆二速得開心益三一近佛故開去佛二喻以香薰如染三出三昧名此則四述己自利利他我本三結答圓通佛問一衆聖略説一大科竟
