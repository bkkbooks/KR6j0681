body:
  text: 三申結互妄分二一正申互具喻明阿難二推結倒真成妄顛倒一詳示染緣起則徧成輪迴竟二詳示淨緣起則歷成諸位分四一正答因果諸位十一漸次三位二一教立位翻染二一法說汝今二喻說如淨二示所立之位二一徵起列名云何二條分別釋三一除其助因三一徵起云何二詳釋三一標依食住阿難二教斷辛毒阿難三深明其過四一發淫增恚過是五二天遠鬼近過如是三無護遭魔過是食四成魔墮獄過命終三結成阿難二刳其正性三一徵起云何二詳釋二一教令持戒三一首示定因戒生阿難二次示先斷婬殺三一正教永斷永斷二反言決定阿難三持教觀婬常觀三後教漸進戒品先持二戒成利益二一生死解脫二一斷婬殺所脫禁戒二斷偷劫所脫偷劫二業報清淨是清三結成是則三違其現業三一徵起云何二詳釋三一根塵雙泯二一牒前持戒離塵阿難二進獲塵忘根盡因不二妙性圓彰三一依報明淨十方二正報妙圓身心三諸佛理現一切三許速證位是人三結成是則二乾慧一位三一不受後有阿難二定名乾慧執心三出其所以欲習三信位十位十一信心即以二念心真信三精進心妙圓四慧心心精五定心執持六不退心定光七護法心心進八迴向心覺明九戒心心光十願心住戒四住位十位十一發心住阿難二治地位心中三修行住心地四生貴住行與五具足住既遊六正心住容貌七不退住身心八童真住十身九王子住形成十灌頂住表以五行位十位十一歡喜行阿難二饒益行善能三無瞋行自覺四無盡行種類五離痴亂行一切六善現行則於七無著行如是八尊重行種種九善法行如是十真實行一一六迴向十位十一離相迴向阿難二不壞迴向壞其三等佛迴向本覺四至處迴向精真五無盡迴向世界六平等迴向於同七等觀迴向真根八真如迴向即一九解脫迴向真得十無量迴向性德七加行四位二一結前起後阿難二別明四位四一煖地位即以二頂地位又以三忍地位心佛四世第一位數量八地上十位十一歡喜地阿難二離垢地異性三發光地淨極四焰慧地明極五難勝地一切六現前地無為七遠行地盡真八不動地一真九善慧地二一正明本地發真二結釋通名阿難十法雲地慈陰九等覺一位二一正明本位如來二出所得慧阿難十妙覺一位如是二總揀非實非染是種三歸重初心勸進阿難四判決邪正令辨作是一正說經竟二說經名分二一文殊請名二一具禮陳白爾時二請名問持當何二如來備說五一從境智為名佛告二從機益為名亦名三從性修為名亦名四從要妙為名亦名五從因果為名亦名二如來委說竟三阿難悟證分二一敘所聞三一結標時眾說是二聞經義理得𫎇三聞經名目兼聞二敘悟證二一同悟禪那頓悟二別證二果斷除一經中具示妙定始終竟二經後別詳初心緊要分二一談七趣勸離以警淹留二一阿難請問二一述謝前益即從二更請後談二一總問諸趣三一領唯心真實二一心體本真世尊二萬法唯心如是二問何有諸趣佛體三質自然因緣世尊二別問地獄三一略舉墮人二一貪淫墮者世尊二怒癡墮者瑠璃二雙質同別此諸三求示護戒惟垂二如來詳答二一讚許佛告二說示三一備明諸趣二一略示昇墜根由三一約積習分判情想二一依真妄分內外阿難二釋成墜昇所以二一釋墜所以三一略釋其名阿難二轉愛屬水二一正明愛水因諸二歷舉驗證是故三結墜原名阿難二釋昇所以三一略釋其名阿難二轉想屬飛二一正明想飛因諸二歷舉驗證是故三結昇原名阿難二約臨終別示昇墜二一約臨終相現阿難二判昇墜分量三一昇而不墜二一先示純想極昇二一無兼止於天上純想二有兼徃生佛國若飛二後示雜想差別二一正論雜想情少二兼論護教其中二不昇不墜情想三墜而不昇二一先示雜情差別三一墜畜生情多二墜餓鬼七情三墜地獄九情二後示純情極墜二一無兼止於阿鼻純情二有兼更生十方若沉三結有處以顯別同循造二詳示墜昇因果七一地獄趣二一發明因習果交三一躡前標後阿難二開因示果二一列十習因以明感招十一淫習四一正明感召一者二即喻騐知如人三所感苦事二習四引聖示戒是故二貪習四一正明感召二者二即喻騐知如人三所感苦事二習四引聖示戒是故三慢習四一正明感召三者二即喻騐知如人三所感苦事二習四引聖示戒是故四瞋習四一正明感召四者二即喻騐知如人三所感苦事二習四引聖示戒是故五詐習四一正明感召五者二即喻騐知如人三所感苦事二習四引聖示戒是故六誑習四一正明感召六者二即喻騐知如人三所感苦事二習四引聖示戒是故七冤習四一正明感召七者二即喻騐知如人三所感苦事二習四引聖示戒是故八見習四一正明感召八者二即喻騐知如人三所感苦事二習四引聖示戒是故九枉習四一正明感召九者二即喻騐知如人三所感苦事二習四引聖示戒是故十訟習四一正明感召十者二即喻騐知如人三所感苦事二習四引聖示戒是故二列六交果以明報應二一徵標云何二徵列六一見報三一臨終見墜一者二本根發相發明三正詳交報如是二聞報三一臨終見墜二者二本根發相發明三正詳交報如是三嗅報三一臨終見墜三者二本根發相發明三正詳交報如是四味報三一臨終見墜四者二本根發相發明三正詳交報如是五觸報三一臨終見墜五者二本根發相發明三正詳交報如是六思報三一臨終見墜六者二本根發相發明三正詳交報如是三總結妄造阿難二分析因殊果別二一約惡業根境以分重輕二一依圓別以判二一極圓極重無間若諸二稍別稍輕無間六根二依具缺以判三一具三入重獄身口二缺一入中獄三業三缺三入輕獄見見二結別造同受以明妄發由是二諸鬼趣分三一躡前起後復次二詳列諸鬼十一恠鬼若於二鬼食色三魅鬼貪惑四蠱毒鬼貪恨五癘鬼貪憶六餓鬼貪傲七魘鬼貪罔八魎魍鬼貪明九役使鬼貪成十傳送鬼貪黨三結妄推無阿難三畜生趣分四一躡前起後復次二詳列諸畜十一臬類物恠二咎徵風魃三狐類一切四毒類蟲蠱五蛔類衰癘六食類受氣七服類綿幽八應類和精九休徵明靈十循類一切三結妄推無阿難四通前結答如汝四人趣分三一躡前警起二一負債反覆徵償三一明本償先復次二因越分反徵若彼三隨勝劣償直二一有力人償如彼二無力畜償若無二負命吞殺不已三一先明剩債易償阿難二正明負命難解如於三惟訐法佛能止除奢二正列人類十一頑類汝今二異類彼三庸類彼狐四狠類彼毒五微類彼蛔六柔類彼食七勞類彼服八文類彼應九明類彼休十達類彼諸三總結可憐阿難五諸仙趣分三一躡前標後阿難二正列諸仙十一地行仙阿難二飛行仙堅固三遊行仙堅固四空行仙堅固五天行仙堅固六通行仙堅固七道行仙堅固八照行仙堅固九精行仙堅固十絕行仙堅固三判同輪迴阿難六諸天趣分二一正列諸天三一六欲二一分欲重輕六一四王天阿難二忉利天於己三焰摩天逢欲四兜率天一切五變化天我無六他化天無世一六欲竟二判屬欲界阿難二四禪三四空七修羅趣二結妄勸離三判決邪正二談五魔令辨以護墮落
