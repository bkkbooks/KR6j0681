body:
  text: 二四禪分二一正分四禪四一初禪三天二一示三天別相三一梵眾天阿難二梵輔天欲習三大梵天身心二結苦離漏止阿難二二禪三天二一示三天別相三一少光天阿難二無量光天光光三光音天吸持二結憂離漏伏阿難三三禪三天二一示三天別相三一少淨天阿難二無量淨天淨空三徧淨天世界二結安隱喜具阿難四四禪九天二一四勝流天二一示四天別相三一示前二天二一福生天阿難二福愛天捨心二判二岐路阿難三示後二天二一廣果天若於二無想天若於二結不動鈍熟阿難二五那含天三一標聖果寄居阿難二示五天別相五一無煩天阿難二無熱天機括三善見天十方四善現天精見五色究竟天究竟三結四天不見阿難二結屬色界阿難二四禪竟三四空分五一標岐除聖復次二正列四天四一空無邊處天若在二識無邊處天諸礙三無所有處天空色四非非想處天識性三聖凡出墜此等四通分凡聖阿難五結屬無色阿難一正列諸天竟二通前總結此皆六諸天趣竟七修羅趣分二一總標名數復次二別識趣攝四一卵生鬼攝若於二胎生人攝若於三化生天攝有修四濕生畜攝阿難一備明諸趣竟二結妄勸離分三一病藥雙舉三一總舉妄病阿難二指病深根阿難三定藥能除若得二同別俱妄阿難三正勸須除三一欲修須除汝勗二不除必墮不盡三增偽自取雖欲二結妄勸離竟三判決邪正作是一談七趣勸離以警淹留竟二談五魔令辨以護墮落分二一無間自說五陰魔境三一普告魔境當識三一將罷迴告即是二陳所欲言二一先明已說汝等二後示未說二一總標魔害汝猶二略陳魔相二一略示前三內外魔相或汝二略示後二心見魔相又復三敕聽許說汝應二會眾頂禮欽承阿難三正以詳陳魔事三一標示動成之由二一驚動諸魔由定二一推真妄生滅相關四一先明本覺同佛佛告二次示妄生空界二一迷妄有虗空由汝二依空立世界化迷三比況空界微茫當知四歸元必壞空界汝等二示大定致魔之相四一定合聖流汝輩二諸有壞動一切三諸魔不容二一先除凡愚訛謬凡夫二後示魔通必知彼等四故來惱亂是故二成就破亂由迷三一分客主而推破亂二一示喻客不成害然彼二正推迷亂由主成就二約悟迷而示勝敗二一悟則必能超勝三一直斷無奈當處二示其所由陰消三總結必袪如何二迷則必成敗墮若不三舉前墮而較淺深二一示墮淫害淺如摩二示隨魔害深此乃二詳分五魔境相五一色陰魔相三一具示始終二一始修未破區宇三一銷念工夫阿難二在定相狀當住三結成區宇精性二終破顯露妄源若目二中間十境十一身能出礙阿難二內徹捨蟲阿難三聞空說法又以四境變佛現又以五空羅寶色又以六闇中見物又以七身同草木又以八覩界覩佛又以九遙見遙聞又以十見善知識又以三結害囑護三一示因交互阿難二迷則成害眾生三囑令保護汝等二受陰魔相三想陰魔相四行陰魔相五識陰魔相三結示超證護持二因請重明五陰起滅一色陰魔相竟二受陰魔相分三一具示始終二一始初未破區宇二一躡前色陰盡相阿難二狀示受陰區宇若有二終破顯露妄源若魘二中間十境十一抑己悲生三一發端現相阿難二指名教悟此名三示迷必墜若作二揚己齊佛三一發端現相又彼二指名教悟此名三示迷必墜若作三定偏多憶三一發端現相又彼二指名教悟此名三示迷必墜若作四慧偏多狂三一發端現相又彼二指名教悟此名三示迷必墜若作五覺險多憂三一發端現相又彼二指名教悟此名三示迷必墜若作六覺安多喜三一發端現相又彼二指名教悟此名三示迷必墜若作七見勝慢他三一發端現相又彼二指名教悟此名三示迷必墜若作八慧安自足三一發端現相此名二指名教悟悟則三示迷必墜若作九著空毀戒三一發端現相又彼二指名教悟悟則三示迷必墜若作十著有恣婬三一發端現相又彼二指名教悟此名三示迷必墜若作三結害囑護三一示因交互阿難二迷則成害眾生三囑令保護汝等二受陰魔相竟三想陰魔相分四一具示始終二一始初未破區宇二一攝前受陰盡相阿難二狀示想陰區宇譬如二終破顯露妄源若動二中間十境十一貪求善巧七一定發愛求阿難二魔遣邪附爾時三客邪投擾其人四王人惑亂是人五按其言狀口中六出名示害此名七教悟戒迷汝當二貪求經歷七一定發愛求阿難二魔遣邪附爾時三客邪投擾其人四王人惑亂是人五按其言狀口中六出名示害此名七教悟戒迷汝當三貪求契合七一定發愛求又善二魔遣邪附爾時三客邪投擾其人四王人惑亂是人五按其言狀口中六出名示害此名七教悟戒迷汝當四貪求辨析七一定發愛求又善二魔遣邪附爾時三客邪投擾其人四王人惑亂是人五按其言狀口中六出名示害此名七教悟戒迷汝當五貪求冥感七一定發愛求又善二魔遣邪附爾時三客邪投擾其人四王人惑亂是人五按其言狀口中六出名示害此名七教悟戒迷汝當六貪求靜謐五一定發愛求又善二魔遣邪附爾時三邪惑事言三一邪附人至其人二現邪惑事令其三說邪惑言口中四出名示害此大五教悟戒迷汝當七貪求宿命五一定發愛求又善二魔遣邪附爾時三邪惑事言三一邪附人至其人二現邪惑事是人三說邪惑言口中四出名示害此大五教悟戒迷汝當八貪求神力五一定發愛求又善二魔遣邪附爾時三邪惑事言三一邪附人至其人二現邪惑事是人三說邪惑言口中四出名示害此大五教悟戒迷汝當九貪求深空五一定發愛求又善二魔遣邪附爾時三邪惑事言三一邪附人至其人二現邪惑事於大三說邪惑言口中四出名示害此名五教悟戒迷汝當十貪求永歲五一定發愛求又善二魔遣邪附爾時三邪惑事言三一邪附人至其人二現邪惑事好言三說邪惑言口中四出名示害此名五教悟戒迷汝當三示勸末世二一預示魔事三一妄稱極果阿難二以婬成化讚歎三陷魔墮獄命終二深勸悲救二一正申勸訶汝今二轉激報恩汝今四結害囑護三一示因交交阿難二迷則成害眾生三囑令保護汝等三想陰魔相竟
