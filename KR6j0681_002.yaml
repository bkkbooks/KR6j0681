body:
  text: 三顯見不滅分三一會眾領悟更請二一序述眾悟三一得悟安樂爾時二悔前迷執念無三以喻狀喜今日二通別兩請二一會眾通請合掌二匿王別請四一教前邪惑時波二教後仍疑我雖三願聞不滅云何四明眾心同今此二如來徵顯不滅三一顯身有變二一略彰變滅三一徵定心滅佛告二徵定滅由三一怪問預知佛言二略舉變相世尊三明知必滅殞忘三印許其言佛言二詳敘變滅三一較量老少二一故問令敘大王二甚言不同世尊二令詳敘變狀二一如來引問佛言二匿王具答二一不覺漸至王言二徵釋推知二一粗推且限十年何以二細推乃至剎那世尊三乃總結必滅故知二指見無變四一徵定不知佛告二許以指示佛告三引敘觀河大王四詳彰不變二一先彰所見不變三一躡前變滅佛言二令較所見則汝三直答不變王言二次彰能見不變三一躡前身變佛言二令較能見則汝三直答不變王言三正申二性二一詳與區分二一因皺以分變與不變佛言二因變以分滅與不滅變者二責留斷見而猶三王等極為喜慶王聞三顯見不滅竟四顯見不失分二一阿難因悟反疑前語阿難二如來發明因倒說失二一即臂倒無失為喻三一定臂之倒相即時二定臂之正相佛告三明顛倒非失佛即二以心倒無失合喻四一據名略以合定則知二徵顯身無正倒隨汝三詳示正倒從心三一標如來慈悲告眾佛興二引昔教以明正相二一示為尋常之教諸菩二萬法唯心所現色心三萬法常在心中汝身三責遺認以明倒相三一怪責遺真認妄云何二詳彰認遺之相二一法說二一彰認妄之相四一誤認器界晦昧二誤認身根色雜三誤認心性聚緣四遂成顛倒一逮二彰遺真之相不知二喻說二一喻遺真認妄譬如二喻以妄為真目為三深責迷倒之甚汝等四結合前喻無失如我四顯見不失竟五顯見無還分四一阿難求決取捨四一述聞法雖悟本心阿難二明不捨悟法緣心而我三明未敢認取本心徒獲四願如來與決取捨願佛二如來破顯二心二一破緣心有還三一先破所緣之法三一法說佛告二喻說二一因法觀心喻如人二執法忘心喻二一正舉執忘若復二雙出兩過二一併法俱失過此人二兼迷法相過豈惟三結定汝亦二正破能緣之心三一正破緣聲之心二一縱言離聲當有若以二喻明離聲無性二一舉喻二一正以客喻譬如二反以主顯而掌二法合二一先合主喻此亦二後合客喻云何二兼破緣色之心斯則三廣至緣法之心如是三結指此心有還則又二顯本心無還二一阿難求示無還阿難二如來詳與顯示四一指喻見精切真佛告二許示無還之旨汝應三備彰八相皆還三一具列八相阿難二各還本因二一許還本因阿難二徵起詳釋二一釋成一相云何二以類俱成暗還三更明該盡則諸四獨顯見性無還汝見三承前判決取捨諸可四結歎自迷淪溺則知五顯見無還竟六顯見不雜分二一阿難以物見混雜疑自性阿難二如來以物見分明顯自性四一先列能所二一列能見之性二一聖眾見三一聲聞見佛告二菩薩見諸菩三如來見十方二凡品見眾生二列所見之物阿難二就中揀擇二一先令自擇汝應二次與代擇今吾三物見分明四一正言物不是見阿難二正言見不是物阿難三反辨見不是物二一辨定非物二一先用轉難破其可見三一是物必成可見若見二可見必依同見若同三難其當見不見吾不二躡開兩途俱證非物二一以可見證成若見二以不見證成若不二結成自性云何四反辨物不是見二一物混例成人混又則二人分例成物分阿難四責疑自性云何六顯見不雜竟七顯見無礙分二一阿難疑見不定而有礙三一躡上疑端阿難二雙舉兩見我與三陳疑以請三一怪問不定世尊二擬度由礙為復三總結疑請我今二如來各出其由而教之二一總示大略佛告二詳與釋教二一喻塵教忘二一明不定由塵二一示二皆無定三一略舉一喻譬如二開途兩問吾復三兩義皆非若定二示義性無在汝言二教忘塵自徧阿難二斥謬教轉二一顯謬出由二一以反難顯謬若如二出成礙之由一切二教以轉物二一標轉物同佛若能二明自在無礙二一體自在身心二用自在於一七顯見無礙竟八顯見不分分二一阿難執身見各体而疑見在前四一領上義而定前相阿難二標認見必遺身心見心三懼隨於過失三一約分別以定親疎而今二明向踈背親之過若實三引佛言反證其失何殊四求如來開示惟埀二如來約萬法一體而破無前相三一直斥妄擬前相佛告二辨定本無是非二一以無是非發其疑四一辨無是非二一無是見三一如來問二一縱成決其可指若實二教其對物指陳三一在前皆可指陳且今二躡之教其指見若必三立格防其混濫二一即物須不壞相阿難二離物須顯自體汝可二阿難答二一即物無是見阿難二離物無是見世尊三佛印許佛言二無非見三一如來問三一述言牒定其意佛復二對物教明非見三一撮略諸物今復二重躡前文必無三正教明見汝又二阿難答三一無非阿難二徵釋何以三總結我又三佛印許佛言二大眾惶悚於是三佛慈安慰如來四文殊代問三一代問之意是時二代問之儀在大三代問之辭四一標眾疑世尊二述眾意世尊三揀眾過非是四求佛示惟願二曉以無是非之故三初一真無是非四一舉諸聖正定佛告二了妄無自體見與三達妄即一真此見四結無是無非云何二於一真總喻二一佛喻一真索是非文殊二文殊直答無二相三一領惟一相如是二答無二相二一無是相無是二無非相然我三結無二相於中三總以法合喻佛言三教以出是非法三一曲顯真妄二相本是二別舉真妄二喻二一二月終墮是非如第二一月方出是非文殊三以法各合二喻二一合二月墮是非是以二合一月出是非由是八顯見不分竟九顯見超情分二一正遣情計二一隨問別遣二一非自然二一阿難約徧常義而疑自然三一領性徧常阿難二躡之起疑二一疑濫於外計與先二疑違於自宗二一舉昔宗世尊二疑今違我今三求佛開示與彼二如來約隨緣義以破之二一直斥其惑佛告二詳破其非二一牒索自然之體阿難二即與甄明見性二一標列詰問汝且二詳與難破阿難二非因緣二一阿難翻自然而疑因緣阿難二如來約不變以破之二一躡問對現佛言二別為破斥二一破因二一標列此見二逐破阿難二破緣二一總列復次二逐破阿難二更與迭拂三一拂已說者當知二拂未說者非不三情盡法真離一二責其滯情二一正責用情汝今二喻明無益如以九顯見超情竟十顯見離見分二一阿難以今教而質昔宗二一躡今教阿難二質昔宗世尊二如來深明其權實不同二一明昔宗非第一義二一直斷其非佛言二明其不了二一定世間義二一如來雙徵阿難二阿難雙答阿難二正明不了三一無明非是無見阿難二雙以例成不見阿難三結申正義雙見若復二示今教為第一義三一先定離緣是故二例成離見四義三責而勉之二一責之見猶二勉之汝等一帶妄示真竟二剖妄出真分二一請許懸應二一阿難述請二一述意二一述未開阿難二述迷悶而今二哀請伏願二佛慈許說二一將示妙修爾時二先開真智三一明其未了告阿二正許開示汝今三兼被未來亦令二分別開示二一釋其迷悶三一雙標二見二一總出其過阿難二別列其名云何二各舉易例二一別業妄見四一先以徵起云何二陳其所見阿難三了無其實二一審於二處於意二難其即離二一難即燈即見阿難二難離燈離見復次四詳示妄因五一正指妄因是故二見體無干影見三誡人妄情終不四喻明所以如第五以法合顯此亦二同分妄見三一先以徵起云何二陳其所見二一總舉洲國二一海中洲數阿難二洲中國數二一大洲國數正中二小洲國數其餘二別舉所見二一兩國同洲阿難二一國所見惟一三了無其實但此三進退合明二一總標例法阿難二依法取例二一例明別業三一舉能例法牒定眚妄四一促舉前法阿難二妄境似有矚燈三妄體本無終彼四真體非病然見二就所例法進退合明二一總成例意例汝二詳應前文三一合明妄境似有見與二合明妄體本無元我三合明真體非病本覺三結見見即離釋迷悶二一令取上義輪釋二一用上顯離覺所二輪釋前語此實二令對目前會釋二一通指是眚者釋妄見是故二別指非眚者釋非見彼見二例明同分三一舉能例法進退合明三一促舉前法阿難二取例別業二一逆以取例例彼二順以釋成二一迴文標同一病二例出妄因彼見三合明同本俱是二就所例法進退合明二一普例世間二一器世間二一從狹至廣例閣二總標有漏諸有二情世間及諸二合明同妄二一合明前六字同是二合明前二字和合三結離見即覺教取證二一離見二一離見緣若能二正離見則復二即覺二一極證二果圓滿二永斷輪迴清淨二開其未開一釋其迷悶竟二開其未開分二一牒前述意二一牒已開阿難二牒未開而猶二逐意發明二一破和合二一總舉妄惑阿難二別為破斥二一破和二一舉法標列則汝二破一例餘二一破一四一不見和相若明二不具和體二一離即雙絕若非二躡成破意必見三不得和合見必四不成和義雜失二例餘彼暗二破合二一舉法標列復次二破一例餘二一破一三一正破合明若明二防破轉記若見三躡歸正破既不二例餘彼暗二破俱非二一承示轉惑阿難二逐意發明二一牒惑示問佛言二別為破斥二一破非和二一總各標列此妙二破一例餘二一破一三一定其有畔若非二索其畔處汝且三躡成破意阿難二例餘彼暗二破非合二一總各標列又妙二破一例餘二一破一二一明其乖角若井二躡成破意見且二例餘彼暗一剋就根性直指真心竟二會通四科即性常住分二一總為剖出二一剖出但知虗法二一舉法自相阿難二剖相出性幻妄二剖出似實有法二一歷舉諸相如是二剖相出性二一觀相生滅全妄因緣二論性即妄皆真二一妄本是真殊不二真本無妄性真二別為剖出四一五陰二一總徵阿難二別釋五一色陰三一舉喻合法二一舉喻二一依於本無阿難二起成有相其人二合法色陰二就喻詳辨二一標非二處阿難二分文各破二一非從空來二一出必有入如是二不成空體若有三不成空義空若二非從目出三一出必有入若目二約入以破二一有見即此二無見若無三約出以破又見三結妄歸真是故二受陰三一舉喻合法二一舉喻二一依於本無阿難二起成有相其人二合法受陰二就喻詳辨二一標非二處阿難二分文各破二一非從空來如是二非從掌出三一約出破之若從二約人破之又掌三約出入破必有三結妄歸真是故三想陰三一舉喻合法二一舉喻阿難二合法想陰二就喻詳辨三一標非二處阿難二展轉推破如是三比類發明想蹋三結妄歸真是故四行陰三一舉喻合法二一舉喻阿難二合法行陰二就喻詳辨二一標非即離阿難二分文各破二一非即空水二一非即空如是二非即水二一非即因水若因二非即水性若即二非離空水若離三結妄歸真是故五識陰三一舉喻合法二一舉喻阿難二合法識陰二就喻詳辨二一標非來入阿難二分文各破二一非彼方來如是二非此方來若此三結妄歸真是故二六入三十二處四十八界一五陰竟
