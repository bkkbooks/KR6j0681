body:
  text: 大分為三一題目大佛二譯人三一主譯人天竺二譯音人烏長三潤文人菩薩三經文三一序分三一六種證信序三一標信與聞如是二時主及處一時三廣列聽衆二一兼本迹以詳列二衆四一據迹標數與大二彰本歎德二一總名似同皆是二別德逈異二一德體超異佛子二德用超異二一上助佛化從佛二下度衆生三一盡本界嚴淨二盡十方應身三盡未來拔濟三略舉上首其名四更盡勝劣復有二兼時會以略顯二衆二一標自恣顯有菩薩二一時會先在衆三一時會誠求屬諸二如來妙應即時三會衆蒙益法筵二音感後至衆迦陵二標齊供顯有天人二一國王齊供時波二臣民齊供城中二示墮發起序三一誤墮因緣四一別請遠游惟有二無侶獨歸既無三無供循乞其日四欲行等慈二一正行等慈心中二表等慈由阿難二正墮淫室三一加意嚴戒經彼二力不勝邪爾時三戒體垂危淫躬三如來救脫三一速歸衆隨如來二說呪遣救于時三破邪救歸惡呪二正宗分三流通分一序分已竟第二正宗分分二一經中具示妙定始終三一阿難哀求二一哀求妙定阿難二大衆欣聞於時二如來委示二一正說經三一說奢摩他令悟妙心本具圓定二一初銷倒想說空如來藏二一如來破妄顯真二一斥破所執妄心以開奢摩他路三一取心判決二一但取能發之心佛告二普判衆生誤認佛言二正與斥破二一如來備破三迷三一密示妄識無處二一按定徵處二一按定二一問定二一教以直心應徵汝今二雙徵能見能愛阿難二答定阿難二徵處佛告二隨執隨破七一破在內二一阿難引十生同計在內阿難二如來以不見身中為破三一喻定次第三一定境內外佛告二定見次第阿難三遠見之由阿難二出定總名爾時三正與決破三一按定所答佛告二反難失次二一如來即喻反難亦有二阿難於喻知謬阿難三就謬難破三一先與合定阿難二詳申其謬二一在內不見謬二一正難當見汝之二以淺況深縱不二昧內知外謬必不三遂與決破是故二破在外二一阿難引燈在室外為喻三一轉成謬悟阿難二徵引燈喻所以三自決同佛是義二如來以身心相知為破二一先以喻明二一如來喻明外不相干佛告二阿難於喻了知不迷阿難二正與決破三一合喻無干佛告二驗非無干我今三遂與結破是故三破根裏二一阿難以琉璃合眼為喻四一悟前轉記阿難二承徵指處佛言三引喻琉璃猶如四脫前二謬然我二如來以法喻不齊為破二一正破二一正辨不齊三一先以按定法喻佛告二喻中實見琉璃彼人三法中不能見眼佛告二雙開兩破若見二結破是故三破根裏竟四破內外二一阿難以見明暗分內外三一承前轉記阿難二正分內外二一先申藏暗竅明是衆二證成見外見內今我三請決於佛是義二如來以不成見內為破二一正破二一破所見之暗不成在內二一雙開對與不對佛告二雙破兩途皆非二一對眼之非二一正言不成內若與二反顯不成內若成二不對之非若不二破能見之眼不得返觀二一以合能而難開不能若離二雙破不見面與見面二一破不見面若不二破見面四一心眼在空過見面二他成己身過若在三身成不覺過汝眼四轉成兩人過必汝二結破是故五破合處六破中間七破無著二顯呵妄識非心三推破妄識無體二會衆知非無辨三結歸判詞二顯示所違真性令見如來藏體二阿難悟謝發心二審除細惑說後二如來藏二說三摩提令依妙心一門深入三說禪那令住圓定歷位修證二說經名三阿難悟證二經後別詳初心緊要四破內外竟五破合處分二一阿難計心隨合隨有三一謬引昔教阿難二指體標處我今三總脫前過亦非二如來破其無從無定二一正破三一牒其所計以定有體佛告二約無從來以破隨合二一正審從來若有二因救轉辨二一阿難救見為眼佛言二如來辨眼無見阿難三約無定體以破隨有二一先開四相阿難二一一推破四一破一體若一二破多體若多三破遍體若遍四破不遍若不二結破是故五破合處竟六破中間分二一阿難計心在根塵之中三一阿難泛說中間二一謬引昔教阿難二檢前立中如我二如來確定中相二一雙徵兩在佛言二雙示不成二一在身不成若在二在處不成若在三阿難別出己見二一異佛現說阿難二同佛昔說如世二如來以兼二不兼為破二一正破二一雙開兩途佛言二雙示俱非二一兼二非中若兼二不兼更非兼二二結破是故六破中間竟七破無著分二一阿難以不著諸物為心二一引佛昔教阿難二釋成請決一切二如來約諸物有無為破二一正破二一雙徵有無佛告二雙示不成二一無尚不成無則二有豈能成二一標定有不二釋成無相二結破是故一密示妄識無處竟二顯呵妄識非心分二一阿難責躬請教三一責請之儀爾時二責請之辭二一自責不知心處二一責未證由恃憍憐我是二責墮淫由不知處不能二求佛別說真處二一正求說示惟願二兼除惡見令諸三懇求同衆作是二如來顯發非心三一表現破顯諸相五一表諸智將現爾時二表衆識將破普佛三表覆蔽將開如是四表分隔將合佛之五表流轉將息其世二普示真妄二本二一舉過出由二一法說二一歷舉衆過三一任運受淪人過佛告二權小修學人過諸修三凡夫修學人過及成二總出其由皆由二喻說猶如二徵釋名體三一徵起云何二正釋二一所執妄本名體阿難二所迷真本名體二者三結歸由諸三正斥妄識非心三一如來重徵直訶三一應求垂問阿難二徵令現前三一於見詳徵三一總徵於見即時二別徵所見佛言三別徵能見佛言二就答徵心佛告三舉心以答阿難三直呵非心佛言二阿難驚索名目阿難三如來指名出過佛告二顯呵妄識非心竟三推破妄識無體分二一阿難述怖求示四一述唯用此心三一出家用此心阿難二作善用此心我心三作惡用此心縱令二述捨此更無若此三述自他驚疑云何四求如來開示唯垂二如來安慰顯發二一安慰許有三一先標垂教深意爾時二示己常說惟心於師三舉況真心有體阿難二顯發虗僞二一托塵似有二二反難離塵當有若汝二正言不能離塵二一外緣不離如汝二內守不離縱滅二離塵實無二一暫縱離有即許為心我非二隨奪離無不得為心三一離無即是塵影若分二塵影即同斷滅塵非三斷滅誰成至道則汝一如來備破三迷竟二會衆知非無辨即時二正與斥破竟三結歸判詞佛告二斥破所執妄心以開奢摩他路已竟二顯示所遺真性令見如來藏體分二一阿難捨妄求真三一悲感陳言阿難二追述痛悔二一悔恃如來不修大定自我二悔恃多聞終無實得今日三表迷求示世尊二如來極顯真體三一放光表顯四一真智洞開相即時二圓照法界相十方三上齊佛界相遍灌四下等生界相旋至二普許開示告阿三說盡真際三一尅就根性直指真心二一帶妄示真十一指見是心三一雙舉法喻現前二一如來雙徵拳見阿難二阿難各答其由阿難二辨定眼見是心三一辨無眼有見顯其不假眼緣三一雙陳法喻令審佛告二阿難未覺不齊阿難三如來斥非詳示四一正斥其非佛告二明其不齊何以三令其詢驗所以四結申有見以是二辨矚暗成見顯其不假明緣二一阿難疑於覩暗非見阿難二如來例明暗見無虧二一雙詰二暗佛告二雙答是同如是三辨見乃是心顯其離緣獨立二一例明眼見之謬二一初例成謬阿難二轉成二謬若燈二結申心見正義二一取例非燈是故二轉例非眼眼能三未悟更希廣示阿難二顯見不動三顯見不滅四顯見不失五顯見無還六顯見不雜七顯見無礙八顯見不分九顯見超情十顯見離見二剖妄出真二會通四科即性常住三圓彰七大即性周遍二顯見不動分二一辨定客塵二字三一如來尋究原悟爾時二陳那詳答二義三一自陳得悟時憍二喻明客字世尊二喻明塵字又如三如來印許其說佛言二正以顯見不動二一對外境以顯不動四一辨定所見即時二辨定開合佛告三辨分動靜佛言四印許其言佛言二就內身以顯不動四一光引頭動如來二審問動由佛告三辨分動靜阿難四印許其言佛言三普責自取流轉三一取昔所悟客塵於是二令觀現前動靜汝觀三正以怪責妄淪二一怪其明知妄由身境云何二責其依舊從妄失真二一曲分三障三一惑從始二業遺失三苦性心二總結長淪輪回二顯見不動竟
