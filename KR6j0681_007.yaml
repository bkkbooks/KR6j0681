body:
  text: 三總結遠魔分三一酬問重訂嚴戒阿難二本必不滋末自不三絶塵決定遠魔阿難一正教持戒竟二助以呪力分二一正以勸持讚勝三一戒不能除若有二轉教呪遣汝教三讚呪最勝斯是二況顯除習無難二一促舉無修尚證三一舉愛習甚深且汝二示蒙宣脫證我一三表無修速資彼尚二況顯發心必除二一明發無上心云何二喻除之最易譬如一歷明預先嚴戒竟二略示場中定慧分二一因戒生定三一牒戒擇師三一牒前持戒若有二正教擇師要當三不遇難成若其二誦呪結界戒成三定中求佛我於二因定發慧二一約戒願久定三一歷舉行人阿難二牒戒明願心滅三尅期久定出入二許顯加發慧我日一初請略說竟二重請詳示分二一重請說道場二一阿難重請二一述己開悟阿難二代請軌則末法二世尊重說三一道場建設五一所見壇式二一塗壇地二一正用牛糞和香佛告二揀用黃土合香四一揀不堪用若非二別用黃土別於三合十種香和上四細羅塗地以此二定壇相方圓二所設莊嚴四一壇心華鉢壇心二鉢外列鏡取八三鏡外華爐鏡外四爐焚沉水純燒三所獻供養二一八味陳供取白二兩時致享每以四所奉尊像三一四外幡華令其二四壁內聖二一總標於檀二別列二一當陽五如來應於二左右二菩薩諸大三門側外護帝釋五所取照映又取二修證節次二一三七初成定慧二一三七工夫三一一七禮誦行道於初二二七專心發願第二三三七一向持呪第三二末日定慧三一佛現摩頂至第二定心成就即於三慧心成就能令二百日頓證聖果三一先防不成由不清淨阿難二正示滿期有證初果從三三後開未成亦見佛性從其三結答酬請汝問二重請說神呪三一會衆重請二一述己自請三一述遭術遇救三一述多聞未證阿難二述被邪呪禁遭彼三述賴呪轉救賴遇二敘蒙呪未聞雖𫎇三請重宣廣利惟願二同衆普請于時二如來重說二一正說神咒三一咒前光相四一如來放頂光爾時二光中現如來光中三化佛放頂光頂放四光中現金剛一一二大衆欽聽大衆三神呪章句南無二說呪利益二一諸佛要用三一指示全名阿難二備彰諸用三一總標因果出生二別列要用六一降魔制外用十方二現身說法用十方三自他授記用十方四苦救難用十方五事師嗣法用十方六攝親轉小用十方三總結始終十方三更明無盡若我二衆生利賴二一別指勝名亦說二備彰威力三一首示行人心賴以勸持二一正示誦方遠魔汝等二開許不誦書帶阿難二詳伸護生助道以出由二一總標二意阿難二別列多功二一約衆生以顯各益三一救護災難二一紀時指人若我二正明救難二一惡緣不能成害當知二惡生不能加害二一不能加害三一加呪不著如是二加毒即化心得三起惡不得一切二仍加守護頻那二助成道業六一資發通明三一明聖眷護呪阿難二舉散心亦從設有三呪菩提心人三一先以標人何況二冥加開發此諸三圓證通明是人二遠離雜趣三一標時至果從弟二不生神鬼生生三不生貧賤是善三常生佛前三一共佛功德此諸二共佛生處由是三共佛薰修無量四衆行成就五一成具戒行是故二成精進行未精三成智慧行無智四成清淨行不清五成齊戒行不持五諸罪消滅四一破戒罪滅二一輕重齊銷阿難二食噉並宥從經二違式罪滅二一不淨即淨設著二不壇即壇從不三極重罪滅若造四極遠罪滅二一積罪未懺阿難二誦呪滅盡若能六速證無生不久三稱遂願求二一生前願求四一求男女復次二求長命求長三求果報欲求四求身色身命二命終往生命終二約國土以顯普益三一諸難消除三一先舉難處阿難二安城迎供二一教以安呪寫此二供佩身家令其三結難消除一切二兆民豐樂阿難三惡星不現二一略標亦復二詳釋二一釋諸星現災是娑二釋鎮消方量有此三承明行人心證以結勸二一承明故說保安二一保護安隱是故二遠離魔冤更無二正明無過必證三一舉現未之人汝及二明不犯四過依我三決必得心通是善三會衆願護二如來重說竟三會衆願護分二一外衆護持五一金剛力士衆說是二兩天統尊衆爾時三八部統尊衆復有四照臨主宰衆復有五地祇天神衆復有二內聖護持三一指人敘儀爾時二顯本久護世尊三正明護持四一定散俱護世尊二魔魅盡袪二一正明盡袪縱令二開除發心除彼三違越必滅世尊四常令如意恆令二說三摩提令依妙心一門深入已竟二說禪那令住圓定歷位修證分二一阿難謝教請位三一具儀陳白阿難二謝請之言二一述過謝益二一述多聞未修我輩二謝蒙教獲益蒙佛二正以請位二一確指果前世尊二歷請諸位云何三拜同衆仰作是二如來對示緣起三一如來讚許爾時二大衆誠聽阿難三正以說示二一總以略標二一所依真如佛言二所起生滅二一略示染緣起囚妄二略示淨緣起滅妄二各以詳示二一詳示染緣起則遍成輪回二一勸識顛倒三一按定問意阿難二勸先識倒先當三結皈所問顛倒二徵釋二倒二一徵釋衆生顛倒三一徵起阿難二正釋三一順流成有三一推敘從無而有阿難二曉示雖有恆無此有三判決依無建立本此二邪復成非三一本無可復迷本二諸復皆非二一先以況顯二一先明正復猶非將欲二況顯邪復益非非真二後以詳陳非生三結惑成業生力三總明招感同業三結成由是二徵釋世界顛倒三一徵起阿難二正釋二一釋成世界名數二一釋成名字是有二釋成數量三世二推由六想成輪三一示吸塵次第是故二明成業輪轉六亂三結循塵旋復是故三結成三一總以結成乘此二別以詳列二一別列類生三一卵胎濕化四生四一卵生由因二胎生由因三濕生由因四化生由因二色想有無四生四一有色由因二無色由因三有想由因四無想由因三有無俱非四生四一非有色由因二非無色由因三非有想由因四非無想由因二勒成名數是名三申結互妄二詳示淨緣起則歷成諸位二別以詳列竟
