body:
  text: 二審除細惑說後二如來藏分二一問答辨劾諸惑二一滿慈躡前以質二疑二一泛敘有疑二一讚歎妙示爾時二正舉疑情二一自疑二一敘昔未聞世尊二求今斷惑佛雖二眾疑二一有學明其習漏世尊二無學述其疑悔我等二確陳以請二二確陳二疑二一疑萬法生續二一牒佛語世尊二正舉疑云何二疑五大圓融二一牒佛語又如二正舉疑世尊二請佛開示而我二如來次第以除二惑三一佛慈許說二一經家敘眾爾時二正舉佛言四一示所說勝如來二示所被機令汝三示所獲益皆獲四囑聽許說汝今二大眾欽承富樓三正為宣說二一正答滿慈二一說不空藏以示生續之由二一正答初問五一牒定所疑佛言二舉所依真二一佛舉常說致問汝常二滿慈答以常聞富樓三辨得妄本三一審得其惑二一如來雙審真妄佛言二滿慈獨取於妄富樓二斥為無明佛言三結成妄本性覺四正明生續二一初之忽生二一最初微細二一細惑覺非二細境無同二漸成粗顯二一粗惑如是二粗境起為二後之相續三一世界相續三一生能成四大四一風大覺明二地大因空三火大堅覺四水大寶明二生所成四居二一總成二居二一示其由生火騰二驗其氣分以是二別成二居二一成山居水勢二成林居土勢三結成種相續交妄二眾生相續三一推由成陰三一指無明本復次二三相妄局所妄三二陰成就同業二詳敘受生二一委示胎生三一舉親因見明二明助緣交遘三結成胎故有二例示四生二一總標成應胎卵二各別指明卵惟三結成相續情想三業果相續三一業果指本三一欲貪富樓二殺貪貪愛三盜貪以人二相續明長二一殺盜無休汝負二欲貪無盡汝愛三結成相續惟殺五雙關結答二一躡相續而結忽生富樓二躡忽生而結相續山河二兼釋轉難分二一滿慈執因疑果二一躡舉疑端富樓二正陳疑難如來二佛分真妄喻釋二一喻妄不復生二一喻無明本空二一舉喻辨定二一舉喻佛告二辨定二一辨始無所從此迷二辨終不復起佛言二合法喻明二一總示合意富樓二詳盡合辭二一合無所從此迷二合不復起昔本二喻萬法現無二一舉喻辨定二一舉喻亦如二辨定汝觀二合法釋明佛言二喻真不復變二一總舉二喻又如二總合二法諸佛二說空不空藏以示圓融之故二兼示阿難二大眾領悟感謝一說不空藏以示生續之由竟二說空不空藏以示圓融之故二一正答次問二一按定所疑富樓二正以開示二一就後一藏以銷疑二一喻明性相二一舉喻二一標列性相喻二一總以略標富樓二徵起詳列所以二難釋相妄喻三一總舉雙徵於意二單舉別難若彼三直以釋難當知二法合二一先伸釋疑兩途二一約相妄釋觀相二約性真釋觀性二後合前文兩喻二一合標列性相喻真妙二合難釋相妄喻二一徵舉影喻云何二就喻明妄三一境先無憑一東二戒止難詰不應三分別愈妄宛轉二申義釋疑此科二圓彰三藏以勸修三一極顯圓融二一依迷悟心對辨緣起二一約染緣起出有礙由二一執成有礙三一以相隱性富樓二全性皆相而如三結成諸礙是故二原始要終眾生二約淨緣起出無礙由二一融成無礙三一以性融相我以二全相皆性而如三結成無礙二一標發四義是故二別示其相不動二原始要終滅塵二依本來心圓彰藏性三一圓彰空藏二一牒舉藏心而如二一切皆非二一非世間二一攝非七大非心二攝非四科非眼二非出世間四一非緣覺法非明二非聲聞法非苫三非菩薩法非檀四非如來法如是二圓具不空二一承上起下以是二正明不空二一牒舉藏心即如二一切皆即二一即世間二一攝即七大即心二攝即四科即眼二即出世間四一即緣覺法即明二即聲聞法即苦三即菩薩法即檀四即如來法如是三融空不空二一承上起下以是二會歸極則二一牒舉藏心即如二即非圓融離即二普責思議如何三結喻推失二一喻智最要二一舉喻譬如二合法汝與二責其不求由不二兼釋轉難一正答次問竟二兼釋轉難分二一滿慈索妄因而擬進修二一推較本末二一推本無二富樓二較末懸殊而我二索請妄因敢問二如來喻無因而示頓歇三一喻明無因四一牒惑起問佛告二舉喻辨定汝豈三以法合喻二一舉法詳合二一直標無因佛言二極明虗妄二一因空無始不可說自諸二妄空無生不可取如是二取喻帖合況復四結成無因富樓二示令頓歇三一示無修之修三一略除妄緣汝但二妄因自絕三緣三妄本亦盡則汝二示無證之證歇即三責劬勞修證何藉三結喻推失三一本有不覺喻譬如二迷之非失喻窮露三悟之非得喻忽有一正答滿慈竟二兼示阿難分二一阿難躡佛語而緣因執三一起問即時二正問四一躡牒佛言世尊二證成怪問斯則三昔教有益我從四今濫自然今說三結問惟埀二如來拂深情而責執悋二一就喻拂情二一拂情伸意三一即喻揆情佛告二雙拂二計二一約頭雙拂二一拂自然阿難二拂因緣二一對辭反詰若自二正結其非本頭二約狂雙拂二一拂自然本狂二拂因緣不狂三躡伸己意若悟二迭拂諸情三一先出兩種生滅二一約菩提出生滅菩提二約自然出生滅滅生二喻明自然非真無生三極盡妄情方是本然二切責執悋二一抑斥戲論二一直斥躭著戲論二一判果難成菩提二出其所以雖復二現證戲論無功二一自全無力汝雖二仗呪方免何須二激修無漏二一正勸勤修無漏是故二更舉劣機激責三一單舉登伽破障如摩二兼與耶輸同益二一開悟益與羅二修證益一念三結責阿難自欺如何一問答劾辨諸惑竟二大眾領悟感謝分二一領悟阿難二感謝二一感謝之儀重復二感謝之言二一稱讚善開無上二詳申謝益能以一說奢摩他令悟妙心本具圓定竟二說三摩提令依妙心一門深入分二一選根直入三一阿難說喻求門證入四一述領佛旨二一領開心之旨世尊二領勸修之旨如來二正喻須門我今三求佛指示二一善求入大之路惟願二別求有學總持今有四拜懇候教作是二如來教示一門深入四一分門以定二義二一欲開修路二一標所為之機二一令在會者安心爾時二令當來者發心及為二明所說之法開無二建立義門三一標示二一本其發心勤求宣示二教其究心義門應當二徵起云何三分判二一決定以因同果澄濁順入涅槃義三一正令審觀二一令尅體審觀三一標本回心阿難二令審同異應當三反決必同阿難二令閱世例觀二一令閱世以是二令例觀二一觀有作必壞可作二觀無作不壞然終二明所欲除二一總示五濁二一尅示濁體三一釋身中四大則汝二示分隔圓明由此三結成濁標數從始二喻明濁相云何二別示五濁五一劫濁阿難二見濁汝身三煩惱濁又汝四眾生濁又汝五命濁汝等三去取方除四一示欲頓證阿難二決定去取應當三取以伏斷二一法二一伏成因地以湛二斷入果地然後二喻二一喻伏成因地如澄二喻斷入果地去泥四結證極果明相二決定從根解結脫纏頓入圓通義二一開示解結一周三一標處指根明結三一原其增上修心第二二泛言當知結處二一法說二一正令審詳妄本應當二反顯決當知處阿難二喻明二一同喻正明阿難二異喻翻顯不聞三確實指根是結三一直指處體則汝二出其過患六為三顯為結處由此二備顯六根數量二一統論本所數量五一躡前徵起阿難二正釋世界三一釋名世為二指體汝今三結數方位三明其相涉一切四勒成量數二一去留界數二一去六留四而此二明其所以上下二正勒涉數二一涉成本數四數二疊成滿數流變五總括始終總括二揀別隨方數量二一總令尅定阿難二別示具缺六一眼根缺如眼二耳根具如耳三鼻根缺如鼻四舌根具如舌五身根缺如身六意根具如意三教其悟圓入一二一令驗六悟圓三一本其欲證無生阿難二令其驗六推詳當驗三顯示圓通勝進若能二令入一解六四一舉前數量我今二令其擇修隨汝三出擇一由二一十方統論則無擇十方二此方就機故須擇但汝四一入六解入一二因問重申委悉二一阿難躡前發問阿難二如來就問重申四一申惑執尚深二一直明我執未盡佛告二況顯法執全在何況二申一六由妄六一雙以徵起今汝二別破二計二一破計一阿難二破計六若此三承明上義是故四推原由妄阿難五判示當機汝須六更以喻明二一舉喻三一從一成六喻如太二除六說一喻除器三真體無干喻彼太二合法則汝三申根結由塵二一別明六一攬色成眼由明二攬聲成耳由動三攬香成鼻由通四攬味成舌由甜五攬觸成身由離六攬法成意由生二總結阿難四申塵忘結盡二一正申解結以酬問二一統論離塵無結是以二正教脫一盡五三一離塵汝但二脫一隨拔三盡五耀性二兼成二妙以證驗二一情界脫纏成互用妙二一先以示妙不由二證不循根阿難二器界超越成純覺妙二一先以示妙阿難二驗不籍緣三一即事以驗三一用肉眼局量阿難二令合成暗相若令三驗暗中知覺彼人二明不籍緣緣見三決成圓通根塵二驗證以釋二疑三綰巾以示倫次四冥授以選本根三大眾承示開悟證入二道場加行一分門以定二義竟二證驗以釋二疑分二一驗釋根性斷滅疑二一阿難錯解佛語以謬難三一因果相違三一按定如來教旨阿難二引果較量今因二一引果明常二一備引七果世尊二總結真常是七二說因為斷二一疑因斷滅若此二疑同妄心猶如三謬疑因果相違云何二後先異說三一據今現說斷滅三一貶根同識世尊二正疑斷滅進退三懼難尅果將誰二考前多許真常如來三謬疑自語相違違越三更求開示惟垂二如來即事驗常以釋疑四一許以除疑二一責徒聞未識佛告二許即事除疑恐汝二擊鐘驗常四一兩番問答二一問聞答聞二一三次致審三一先審有聞即時二次審無聞鐘歇三復審有聞時羅二重與確定佛問二問聲答聲二一三次致審三一先審有聲如來二次審無聲少選三復審有聲有頃二重與確定佛問二責其矯亂二一直責矯亂佛語二因問勘定大眾三破申正義二一先破滅無之見二一取更擊以驗未滅阿難二取知無以驗不無知有二後申真常正義是故四責迷戒謬汝尚三引夢驗常二一驗夢不昧四一夢外實境如重二夢中誤認其人三分別不昧即於四寤時述誤於時二決定性常二一即離塵不昧阿難二知形銷不滅縱汝四申迷教守二一普申迷常故墮無常二一明逐妄迷真以諸二結無常流轉不循二教令守必成正覺三一正教守常若棄二六解一忘二一常光現而六解常光二緣影盡而一忘超相三決成正覺云何二證釋別有結元疑一驗釋根性斷滅疑竟
