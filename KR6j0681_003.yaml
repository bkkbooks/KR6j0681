body:
  text: 二六入分二一總徵復次二別釋六一眼入三一妄依真起阿難二辨妄無實二一無有實體二一托塵妄現因子二離塵無體此見二無所從來二一總以標列如是二徵起逐破三一不從塵來何以二不從根來若從三不從空來若於三結妄歸真是故二耳入三一妄依真起阿難二辨妄無實二一無有實體二一托塵妄現因子二離塵無體此見二無所從來二一總以標列如是二徵起逐破三一不從塵來何以二不從根來若從三不從空來若於三結妄歸真是故三鼻入三一妄依真起阿難二辨妄無實二一無有實體二一托塵妄現因子二離塵無體此見二無所從來二一總以標列如是二徵起逐破三一不從塵來何以二不從根來若從三不從空來若從三結妄歸真是故四舌入三一妄依真起阿難二辨妄無實二一無有實體二一托塵妄現因子二離塵無體此見二無所從來二一總以標列如是二徵起逐破三一不從塵來何以二不從根來若從三不從空來若從三結妄歸真是故五身入三一妄依真起阿難二辨妄無實二一無有實體二一托塵妄現因子二離塵無體此見二無所從來二一總以標列如是二徵起逐破三一不從塵來何以二不從根來若從三不從空來必於三結妄歸真是故六意入三一妄依真起阿難二辨妄無實二一無有實體二一托塵妄現因子二離塵無體此見二無所從來二一總以標列如是二徵起逐破三一不從塵來何以二不從根來若從三不從空來必於三結妄歸真是故三十二處分二一總徵復次二別釋六一眼色處四一標舉二處阿難二雙以徵起於意三分文難破二一破見生色阿難二破色生見若復四結妄歸真是故二耳聲處四一標舉二處阿難二雙以徵起於意三分文難破三一破色至耳阿難二破耳至聲若復三破無來往若無四結妄歸真是故三鼻香處四一標舉二處阿難二詳以徵起於意三分文難破三一破從鼻生二一按定鼻生須出阿難二依出轉破其謬二一體用不相應鼻非二名義不相應稱汝二破從空生若生三破從木生若生四結妄歸真是故四舌味處四一標舉二處阿難二詳以徵起於意三分文難破三一破從舌生三一按定一舌阿難二當成一味其舌三兩途難破二一不變即失舌義若不二變移即須多體若變二破從食生二一食不自知若生二轉成他知又食三破從空生四一標令噉空若生二按定一味必其三展轉成謬三一通身常醎謬既醎二知醎味淡謬既常三形對并失謬若不四竟失味義必無四結妄歸真是故五身觸處三一標舉二處阿難二開途難破二一約二觸破三一徵定能觸於意二破不成二若在三防轉二知若各二約一觸破三一按定一體若頭二破一不成若一三防轉二體若二三結妄歸真是故六意法處四一標舉二處阿難二雙以徵起此法三分文難破二一破即心所生阿難二破離心別有二一總詰若離二各破二一約有知破二一轉塵為心知則二異即皆謬二一異己成他謬異汝二即己何二謬即汝二約無知破四一檢非徵處若非二明其無在今於三防其轉記不應四竟不成處心非四結妄歸真是故三十二處竟四十八界分二一總徵復次二別破六一眼色識界四一標舉三界阿難二雙以徵起此識三分合難破三一破因眼生二一無塵廢識阿難二無表非界汝見二破因色生四一從變不識空若因二不變不成界若色三從變不成界從變四不變不識空不變三破共相生若兼四結妄歸真是故二耳聲識界四一標舉三界阿難二雙以徵起此識三分合難破三一破因耳生三一約勝義根破阿難二約浮塵根破二一離塵無聞若取二徒肉非界云何三約二根結破則耳二破因聲生二一約根塵雙失破若生二約根塵雙存破三一證成聞識識從二兩途俱非不聞三躡成無知識己三破共相生不應四結妄歸真是故三鼻香識界四一標舉三界阿難二雙以徵起此識三分合難破三一破因鼻生三一雙詰二根阿難二約浮塵根破三一先轉其體若取二次失其名名身三躡破非界鼻尚三約勝義根破二一總詰知性若取二詳分難破三一非肉知以肉二非空知二一轉知屬空而廢肉以空二攬空為自而廢身如是三非香知二一轉自成他謬以香二攬他為自謬二一縱外成肉若香二氣鼻從破二一從氣破鼻三一離氣齅鼻二物二必不兼聞臭則三兼聞墮二若香二從鼻破氣二一因根合塵若鼻二合塵廢界臭既二破因香生三一成不知香二一縱成香生若因二以喻難法如眼二兩途言非知即三二界俱破香非三破共相生即無四結妄歸真是故四舌味識界四一標舉三界阿難二雙以徵起此識三分文難破四一破舌生二一根轉塵亡阿難二教甞難破二一教自甞舌汝自二兩途俱非二一舌苦誰甞若舌二非苦何界舌性二破味生二一不成知味若因二更成相壞三一以多壞一又一二以一壞多識體三躡失名義分別三破空生不應四破共生舌味四結妄歸真是故五身觸識界四一標舉三界阿難二雙以徵起此識三分合難破三一破因身生阿難二破因觸生若因三破共相生三一標定合顯阿難二正破共生三一所生無兼相知身二能生無對相身觸三能所互不成內外三總以結破則汝四結妄歸真是故六意法識界四一標舉三界阿難二雙以徵起此識三分合難破三一破因意生二一根塵存亡破阿難二根識同異破三一雙審同異又汝二別為致詰二一詰同意同意二詰異意二一正破異意異意二兩途俱非若無三雙承結破惟同二破因法生三一外不涉內若因二內無自體三一牒標令觀汝識二離外無體若離三決托外影生則三躡意結破所因四結妄歸真是故二會通四科即性常住竟三圓彰七大即性周徧分二一阿難轉疑雙非二一執權疑實阿難二請佛開示惟埀二佛與進示圓旨三一責迷許說二一責迷二一明應求施教爾時二責取捨昏悋如何二許說汝今二阿難佇聽阿難三正與開示二一總喻性相三一牒取前語阿難二異喻別明二一明非不和合阿難二明非是和合若和三同喻總明阿難二別詳七大七一地大三一標性約柝汝觀二就析詳辨二一因析入而定生出阿難二總牒起而詳推破二一牒標汝今二詳破三一約空無數量破汝且二約色不成空破二一故難成空之謬又鄰二例明成色之謬若色三約空無合義破色猶三結顯斥執二一結顯二一全體圓融汝元二大用無限隨眾二斥執循業二火大三一標性約求阿難二就求詳辨四一舉例阿難二牒定阿難三標徵彼手四逐破二一開破例審二一開破三一破從日生阿難二破從鏡生若鏡三破從艾生若生二例審汝又二合破直審二一合破日鏡二直審不應三結顯斥執二一結顯二一全體圓融汝猶二大用無限二一正明大用隨眾二驗其無限阿難二斥執循業三水大三一標性約求阿難二就求詳辨二一徵起此水二逐破二一開破例審二一開破三一破從月生阿難二破從珠生若從三破從空生若從二例審汝更二合破直審二一合破月珠二直審不應三結顯斥執二一結顯二一全體圓融汝尚二大用無限二一正明大用隨眾二驗其無限阿難二斥執循業四風大三一標性約拂阿難二就拂詳辨二一徵起此風二逐破二一開破例審二一開破三一破從衣生阿難二破從空生若生三破從面生若風二例審汝審二合破直審二一合破風空二直審不應三結顯斥執二一結顯二一全體圓融汝宛二大用無限二一正明大用隨眾二驗其無限限難二斥執循業五空大四一標性約鑿阿難二就鑿詳辨二一徵起此空二逐破二一開破例審二一開破三一依無因破阿難二依出土破二一破有出入若因二破無出入若無三依鑿以破二一破因鑿以出若因二破不因鑿出不因二例審汝更二合破直審二一合破鑿空二直審不應三合會警悟二一融性合會若此二警令發悟阿難四結顯斥執二一結顯二一全體圓融汝全二大用無限二一正明大用隨眾二驗其無限阿難二斥執循業六見大四一標性約塵阿難二就塵詳辨二一徵起此見二逐破二一開破例審二一開破四一破同三一牒起徵辭阿難二約塵顯謬二一標定相亡則明二正以顯謬若與三結成非同若明二破異三一牒起徵辭若此二顯不離塵二一離塵令觀汝離二離塵無體離明三結成非異明暗三破或同或異明暗四破非同非異分空二例審汝更二合破直審二一合破見覺二直審不應三合會警悟二一融性合會若見二警令發悟阿難四結顯斥執二一結顯二一全體圓融汝曾二大用無限二一正明大用隨眾二總類六根二一類全體如一二類大用圓滿二斥執循業七識大四一標約根塵二一標舉三法阿難二揀別根識二一揀明根相其目二揀明識相汝識二就根塵辨二一徵起此識二逐破二一開破例審二一開破四一破因根生阿難二破因塵生若汝三破因空生二一牒徵開義若生二分合例破二一分二破非見二合二破處此四破無因生若無二例審汝更二合破直審二一合破識動二直審不應三合會警悟二一融性合會若此二警令發悟阿難四結顯斥執二一結顯二一全體圓融汝元二大用無限含吐二斥執循業一如來破妄顯真竟二阿難悟謝發心分二一承示開悟二一敘承示爾時二敘開悟二一悟周徧二一總標身心二詳敘二一心蕩然二一標能徧意是諸二徹悟依報二一轉大為小見十二轉他為自一切二身蕩然二一標能包義心精二徹悟正報二一轉粗為細反觀二轉實為虗如湛二悟常住了然二讚謝發心二一禮謝標偈禮佛二正陳偈詞二一讚謝妙湛二發心二一正發大心二一總期報恩願今二別求證除二一於度生求證伏請二於成佛求除大雄二結以深誓舜若初銷倒想說空如來藏竟
