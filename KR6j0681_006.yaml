body:
  text: 二觀音廣陳分三一作禮陳白爾時二陳白之言三一本師傳授反聞三一古佛同名世尊二從佛發心我於三秉受法門彼佛二次第解結修證三一初解三結先得人空三一脫動塵初於二脫動靜所入三脫聞根如是二次解二結成法解脫二一脫覺觀盡聞二脫重空空覺三後解一結俱空不生生滅三詳演所獲殊勝二一標列二本二一總標忽然二別列二一上合慈力一者二下合悲仰二者二承演三科三一三十二應三一標承慈力世尊二條列妙應二一應希求心二一應求聖乘四一菩薩世尊二獨覺若諸三緣覺若諸四聲聞若諸二應求雜趣二一諸天二一天主四一梵天王若諸二帝釋天若諸三自在天若諸四大自在若諸二天臣三一上將若諸二四王若諸三太子若諸二人趣四一世諦男子二一人主若諸二臣民四一長者若諸二居士若諸三宰官若諸四術士若諸二奉教男女二一出家二眾二一比丘若有二比丘尼若有二在家二眾二一優婆塞若有二優婆夷若有三世諦女二若有四童真男女二一童男若有二童女若有二應厭離心二一八部眾七一諸天眾若有二諸龍眾若有三藥叉眾若有四乾闥婆若乾五阿修羅若阿六緊那羅若緊七摩呼羅伽若摩二人非人眾二一人眾若諸二非人眾若諸三結名出由是名二十四無畏三一標承悲仰世尊二條列無畏四一八難無畏八一苦惱難一者二火燒難二者三水溺難三者四鬼害難四者五刀兵難五者六鬼見難六者七枷鎻難七者八賊盜難八者二三毒無畏三一貪毒九者二嗔毒十者三癡毒十一三二求無畏二一求男十二二求女十三四持名無畏四一合界菩薩功德十四二一已圓通徧含由我三一號功齊眾號能令四更出同功之由世尊三結名顯益是名三四不思議二一總承圓通世尊二分條別列四一同體形呪不思議三一由根不隔一者二一體多用故我三偏詳現形二一備彰多相三一多首其中二多臂二臂三多目二目二差別護生或慈二異體形呪不思議二一由聞脫塵二者二令生脫畏三一各形各呪故我二雙顯護生其形三結得名稱是故三破慳感求不思議三者四供養佛生不思議二一由得究竟四者二故廣供養二一上供十方佛能以二傍及六道品三一總標及生傍及二歷舉應求求妻三超至究竟如是三結答圓通三一正結圓通佛問二兼明授記世尊三更述名稱由我二大眾各說竟二佛現瑞應分三一彰圓通總相二一以自徹他因果瑞爾時二以他徹自因果瑞彼諸二顯圓通別相四一聲色微妙瑞林木二悟證相應瑞是諸三行知妙嚴瑞即時四相性融一瑞此娑三示圓通法藥梵明二佛敕諸聖各說竟三佛敕文殊揀選分二一如來敕選二一先示諸說平等三一令觀能說諸聖於是二次示所說圓通各說三正明平等無別彼等二後出揀選本意三一欲契對當機我今二欲垂範未來兼我三問何門易成何方二文殊偈對二一敘儀標偈文殊二詳演偈文六一發源開選二一雙示二源二一所依真源覺海二能依妄源元明二略彰生滅二一萬法生起迷妄二萬法還滅二一先彰劣妄空生二後明頓滅漚滅三正明須選二一諸門平等歸元二須選當根初心二了揀諸門四一揀六塵六一色塵不徹色想二聲塵言偏音聲三香塵不恒香以四味塵不一味性五觸塵不定觸以六法塵不徧法稱二揀五根五一眼根不圓見性二鼻根缺中鼻息三舌根不常舌非四身根不會身與五意根雜念知根三揀六識六一眼識無定識見二耳識非初心聞三鼻識有住鼻想四舌識有漏說法五身識不徧持犯六意識緣物神通四揀七大七一地大非通若以二水大非真若以三火大非初若以四風大有對若以五空大非覺若以六識大虗妄若以七根大殊感諸行三獨選耳根二一備彰門妙四一隨方定門我今二讚人殊勝二一略讚自利離苦二廣讚利他四一總明常徧於恒二自在護生得大三音備眾美妙音四恩沾凡聖救世三示法真實二一標啟佛述說我今二列三種真實三一圓真實譬如二通真實二一揀他非通自非二顯自為通隔垣三常真實二一對塵顯常二一動靜無關音聲二生滅雙離聲無二離思顯常縱令四顯行當根三一舉此方教體今此二明病在循聲二一泛論失旨眾生二尅指證驗阿難三顯應病與藥豈非二委示修巧三一出名教以反聞三一囑專聽而出名阿難二抑多聞而顯過汝聞三決取捨而反聞將聞二法喻詳明修證三一法說二一歷示次第超越二一情界脫纏二一脫塵盡根聞非二入一解六一根二器界超越二一塵銷覺淨見聞二淨極越界淨極二因顯昔妄難干摩登二舉喻如世三法合六根三結示因果究竟餘塵四普勸修持三一正普勸結通大眾二明諸佛共由二一總標諸佛此是二別列三世過去三示己身親證我亦五結答請加二一正以結答二一觀音最合聖言誠如二諸門未孚佛旨自餘二請求加被二一禮讚求加頂禮二出其二故二一徧對機宜方便二一超一切但以六總結義盡真實二如來教示一門深入竟三大眾承示開悟證入分二一阿難一類開悟二一正明開悟於是二復以喻明觀佛二登伽一類證入三一得法眼淨普會二成阿羅漢性比三發菩提心無量一選根直入科竟二道場加行科分二一初請略說二一阿難請二一禮謝自悟阿難二拜請度他二一標意禮稱欲益二求請之言二一述己請意二一先明自悟我今二後表為他二一引證佛言常聞二願同菩薩我雖二正請道場二一明聖遠邪興世尊二求遠離魔事欲攝二如來說三一如來讚許爾時二會眾欽承阿難三正與說示二一總舉三學二一引律標義佛告二指實定名所謂二別列二學二一歷明預先嚴戒二一正教持戒三一攝前徵起阿難二開釋四重四一斷淫二一曲分損益之相三一首陳持犯利害二一持則必出生死若諸二犯則必落魔道三一必不出塵汝修二必墮魔類縱有三兼成增謾彼等二預辨魔佛教儀二一貪淫化世即魔教三一預記末法我滅二魔盛宣淫多此三陷人壞道令識二教入斷淫即佛誨汝教三確定菩提成否二一喻不斷無成三一舉帶淫修禪是故二喻沙不成飯如蒸三合淫不成道汝以二勸淉斷方成必使二判決邪正之說如我二斷殺二一曲分損益之相三一首陳持犯利害二一持則必出生死阿難二犯則必落神道三一必不出塵汝修二必墮鬼神縱有三兼成增慢彼諸二預辯鬼佛教儀二一食肉化世即鬼教三一預記末法我滅二鬼化食肉二一述鬼化儀多此二廢權防難三一明現在權化阿難二出權化之由汝婆三明滅後非教奈何三陷苦增纏二一必陷苦海汝等二必不出纏如是二教人斷殺即佛誨汝教三確定解脫得否二一喻不斷難脫二一正喻是故二況顯清淨二勸深斷方脫二一舉能斷賞讚二一正以舉讚若諸二徵起喻釋何以二正勸斷許脫必使二判決正邪之說如我三斷盜二一曲分損益之相三一首陳持犯利害二一持則必出生死阿難二犯則必落邪道三一必不出塵汝修二必墮妖邪縱有三兼成增慢彼等二預辨妖佛教儀二一潛匿詃惑即妖教三一預記末法我滅二多妖偷化多此三誤人墮獄三一先以己教相形我教二顯是違教倒說云何三正示疑誤深害由是二教人斷偷即佛誨二一先出自己誨四一教以捨身微因若我二許其畢債出世我說三抑揚明其近道雖未四親證違此須償若不二轉教先佛誨汝教三確定三昧得否二一喻其不斷難得是故二勸其深斷方得三一惟依了義捨施三一身捨貪悋若諸二心捨慢嗔於大三身心捨盡必使二不引權乘欺誑不時三印其得真三昧佛印二判決邪正之說如我四斷妄二一曲示戒勸之意四一首陳妄語大損三一躡標妄語成魔阿難二指實述其言意所謂三記其損善墮落是一二表己禁敕顯偽二一詳示真人必密三一敕二聖冥化三一標墮類度生我滅二詳順逆二相或作三約佛佛則同與其二明祕言無泄終不三許臨終陰付惟除二因顯泄言必偽云何三轉教先佛明誨汝教四確定菩提成否二一詳喻不斷無成三一舉刻糞喻二一先以喻明不得是故二後以形顯違教我教二舉妄號喻二一先以喻明取罪譬如二後以況顯罪深況復三舉噬臍喻二一先示因果虗偽因地二後喻菩提不成求佛二深許能斷必成若諸二判決邪正之說如我三總結遠魔二助以呪力二略示場中定慧二重請詳示開釋四重大科竟
